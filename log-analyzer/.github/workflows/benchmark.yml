name: Performance Benchmarks

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run benchmarks daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  CARGO_TERM_COLOR: always
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch full history for performance comparison

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Rust Cache
      uses: swatinem/rust-cache@v2
      with:
        workspaces: log-analyzer/src-tauri -> target
        cache-all-crates: true

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

    # 注意：Bench 文件已移至 workspace crates 中，待后续完善
    # 当前运行 workspace 测试作为性能回归基线
    - name: Run workspace tests as performance baseline
      run: |
        cd log-analyzer/src-tauri
        cargo test --workspace --lib --bins --release -- --test-threads=4 2>&1 | tee test_results.txt

    - name: Check test performance
      run: |
        cd log-analyzer/src-tauri
        python3 -c "
        import re
        import sys

        with open('test_results.txt', 'r') as f:
            content = f.read()

        # 统计测试结果
        test_count = len(re.findall(r'test .* \.\.\. ok|test .* \.\.\. FAILED', content))
        passed = content.count('... ok')
        failed = content.count('... FAILED')

        print(f'📊 Workspace Test Summary:')
        print(f'  Total tests: {test_count}')
        print(f'  Passed: {passed}')
        print(f'  Failed: {failed}')

        if failed > 0:
            print('❌ Some tests failed')
            sys.exit(1)
        else:
            print('✅ All workspace tests passed')
        "

    - name: Upload test results
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ github.sha }}
        path: log-analyzer/src-tauri/test_results.txt
        retention-days: 30

  benchmark-comparison:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: benchmark

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download current test results
      uses: actions/download-artifact@v4
      with:
        name: test-results-${{ github.sha }}
        path: current-results/