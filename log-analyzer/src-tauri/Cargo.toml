[package]
name = "log-analyzer"
version = "1.0.1"
description = "Log Analyzer - FFI Backend for Flutter"
authors = ["you"]
edition = "2021"
rust-version = "1.78"  # MSRV (Minimum Supported Rust Version)

# Flutter FFI 支持 - 生成 cdylib
[lib]
name = "log_analyzer"
crate-type = ["cdylib", "lib"]

# 允许 flutter_rust_bridge 宏生成的 cfg 条件
[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ["cfg(frb_expand)"] }

# =============================================================================
# 依赖管理 - 使用精确版本控制减少重复依赖
# =============================================================================
[dependencies]
# FFI Bridge for Flutter (flutter_rust_bridge 2.x)
flutter_rust_bridge = { version = "=2.11.1", features = [] }

# 条件依赖: Tauri (仅在 standalone feature 时启用)
tauri = { version = "2.4", features = [], optional = true }
tauri-build = { version = "2.4", features = [], optional = true }
tauri-plugin-opener = { version = "2.5", optional = true }
tauri-plugin-dialog = { version = "2.2", optional = true }
tauri-plugin-shell = { version = "2.2", optional = true }

# 序列化/反序列化
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# UUID 生成
uuid = { version = "1.15", features = ["v4", "serde"] }

# 正则表达式（精简 features 以减少编译时间）
regex = { version = "1.11", default-features = false, features = ["std", "unicode-perl"] }
regex-automata = { version = "0.4", default-features = false, features = ["std", "syntax", "dfa-build", "dfa-search"] }

# 多模式匹配算法
aho-corasick = "1.1"

# 时间处理
chrono = { version = "0.4", features = ["serde", "clock"], default-features = false }

# 文件系统遍历
walkdir = "2.5"

# 临时文件
tempfile = "3.19"

# =============================================================================
# 压缩库 - zip 2.x 升级（重大更新）
# zip 2.x 相比 0.6.x 的改进：
# - 支持 zip64 扩展（>4GB 文件）
# - 更好的加密支持（AES-256）
# - 改进的异步支持
# - 更少的内存占用
# =============================================================================
zip = { version = "2.2", default-features = false, features = ["deflate"] }
tar = { version = "0.4", default-features = false }
flate2 = { version = "1.1", default-features = false, features = ["zlib-ng"] }

# MIME 类型检测
mime_guess = "2.0"

# 编码处理
encoding_rs = "0.8"
chardetng = "0.1"

# =============================================================================
# 异步运行时 - 精简 Tokio features
# 避免使用 "full"，只启用需要的功能以减少编译时间和二进制大小
# =============================================================================
tokio = { version = "1", features = [
    "rt-multi-thread",
    "macros",
    "sync",
    "time",
    "fs",
    "io-util",
], default-features = false }

# 二进制序列化
bincode = { version = "1.3" }

# 并行处理
rayon = "1.10"

# Windows 路径规范化
dunce = "1.0"

# LRU 缓存
lru = "0.13"

# 文件系统监听
notify = "8.0"

# Unicode 规范化
unicode-normalization = "0.1"

# 错误处理
thiserror = "2.0"
anyhow = "1.0"
async-trait = "0.1"

# 系统信息
sysinfo = { version = "0.33", default-features = true }

# 延迟初始化
once_cell = "1.21"

# =============================================================================
# 错误处理与日志 - 行业标准方案
# =============================================================================
eyre = "0.6"
color-eyre = { version = "0.6", optional = true }
miette = { version = "7.5", features = ["fancy"] }

# 结构化日志
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json", "fmt", "ansi"] }
tracing-appender = "0.2"

# 错误监控（可选）
sentry = { version = "0.36", features = ["tracing"], optional = true }

# =============================================================================
# 高性能并发 - 无锁数据结构和高效锁
# =============================================================================
parking_lot = { version = "0.12", features = ["arc_lock", "send_guard"] }
crossbeam = { version = "0.8", default-features = false, features = ["std", "crossbeam-channel"] }
tokio-util = { version = "0.7", features = ["rt", "io", "time"] }

# =============================================================================
# 企业级缓存
# =============================================================================
moka = { version = "0.12", features = ["future", "sync"] }

# =============================================================================
# 速率限制
# =============================================================================
governor = { version = "0.10", features = ["std"] }
nonzero_ext = "0.3"

# =============================================================================
# 全文搜索引擎 - Tantivy
# =============================================================================
tantivy = { version = "0.23", features = ["mmap"] }
roaring = { version = "0.10", features = ["serde"] }
memmap2 = "0.9"
base64 = "0.22"

# =============================================================================
# 验证与安全
# =============================================================================
validator = { version = "0.20", features = ["derive"] }
sanitize-filename = "0.6"

# RAII 资源管理
scopeguard = "1.2"

# =============================================================================
# 异步流
# =============================================================================
futures = { version = "0.3", default-features = false, features = ["std", "async-await", "executor"] }

# =============================================================================
# 配置管理
# =============================================================================
config = { version = "0.15", default-features = false, features = ["toml", "json"] }
toml = { version = "0.8", default-features = false, features = ["parse", "display"] }

# 并发哈希映射
dashmap = { version = "6.1", features = ["rayon", "serde"] }

# 哈希算法
sha2 = { version = "0.10", default-features = false, features = ["std"] }

# =============================================================================
# 数据库 - SQLx 升级到 0.8.x
# sqlx 0.8.x 相比 0.7.x 的改进：
# - 更好的性能（查询缓存优化）
# - 改进的编译时检查
# - 新的查询宏
# - 更好的错误消息
# =============================================================================
sqlx = { version = "0.8", features = ["runtime-tokio", "sqlite", "chrono", "uuid"], default-features = false }

# 流式压缩
async-compression = { version = "0.4", features = ["tokio", "gzip", "zstd", "bzip2"], default-features = false }

# CPU 核心检测
num_cpus = "1.16"

# =============================================================================
# 归档支持
# =============================================================================
# RAR 支持（条件编译）
unrar = { version = "0.5", optional = true }

# 7z 支持
sevenz-rust = { version = "0.6", default-features = false }

# 异步 zip
async_zip = { version = "0.0.17", default-features = false, features = ["tokio", "deflate"] }

# 异步 tar
tokio-tar = { version = "0.3", default-features = false }

# 重试机制
tokio-retry = { version = "0.3", default-features = false }

# 字节处理
bytes = { version = "1.10", default-features = false }

# =============================================================================
# 监控与可观测性
# =============================================================================
tracing-opentelemetry = { version = "0.30", optional = true }
opentelemetry = { version = "0.29", optional = true }
opentelemetry_sdk = { version = "0.29", features = ["rt-tokio"], optional = true }
opentelemetry-otlp = { version = "0.29", features = ["grpc-tonic"], optional = true }
opentelemetry-semantic-conventions = { version = "0.29", optional = true }
prometheus = { version = "0.14", default-features = false }
metrics = { version = "0.24", default-features = false }

# =============================================================================
# 插件系统
# =============================================================================
libloading = { version = "0.8", default-features = false }

# =============================================================================
# 过程宏 crate（本地路径）
# =============================================================================
log-lexer = { path = "crates/log-lexer" }
log-lexer-derive = { path = "crates/log-lexer-derive" }

# =============================================================================
# 开发依赖
# =============================================================================
[dev-dependencies]
rstest = "0.25"
proptest = { version = "1.6", default-features = false, features = ["std", "timeout"] }
criterion = { version = "0.5", features = ["html_reports"] }
tokio-test = "0.4"
rand = "0.8"
rand_pcg = "0.3"

# =============================================================================
# 编译配置
# =============================================================================
[profile.dev]
# 开发模式优化：平衡编译速度和运行时性能
opt-level = 1          # 基本优化
debug = true           # 保留调试信息
lto = false            # 禁用链接时优化（加快编译）
codegen-units = 256    # 更多并行编译单元
panic = "unwind"       # 启用 panic 回溯
incremental = true     # 增量编译

[profile.dev.package."*"]
# 依赖库使用更高优化级别（改善开发体验）
opt-level = 2

[profile.release]
# 发布模式优化：最大化运行时性能
opt-level = 3
lto = "thin"
codegen-units = 1
panic = "abort"
strip = true
debug = false

[profile.release.package."*"]
opt-level = 3

[profile.bench]
# 基准测试配置
opt-level = 3
lto = "thin"
codegen-units = 1

[profile.test]
# 测试配置
opt-level = 1
debug = true

# =============================================================================
# Features 配置
# =============================================================================
[features]
default = ["ffi"]
test = []
ffi = []
standalone = [
    "dep:tauri",
    "dep:tauri-build",
    "dep:tauri-plugin-opener",
    "dep:tauri-plugin-dialog",
    "dep:tauri-plugin-shell",
    "dep:color-eyre",
]
rar = ["dep:unrar"]
telemetry = [
    "dep:tracing-opentelemetry",
    "dep:opentelemetry",
    "dep:opentelemetry_sdk",
    "dep:opentelemetry-otlp",
    "dep:opentelemetry-semantic-conventions",
]

# =============================================================================
# Benchmark 配置
# =============================================================================
[[bench]]
name = "m1_benchmark"
harness = false

# =============================================================================
# 构建脚本
# =============================================================================
[build-dependencies]
tauri-build = { version = "2.4", optional = true }
