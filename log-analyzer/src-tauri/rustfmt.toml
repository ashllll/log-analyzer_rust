# Rustfmt 配置

# 使用Unix风格换行符
newline_style = "Unix"

# 最大行宽
max_width = 100

# 缩进
tab_spaces = 4
hard_tabs = false

# 以下配置需要 nightly 工具链，CI 使用 stable，暂时注释
# imports_granularity = "Module"
# group_imports = "StdExternalCrate"
# wrap_comments = true
# comment_width = 80

# 其他格式选项
reorder_imports = true
reorder_modules = true

# 链式调用
chain_width = 60
