name: Rust Coverage

on:
  push:
    branches: [main]
    paths:
      - 'log-analyzer/src-tauri/**'
  pull_request:
    branches: [main]
    paths:
      - 'log-analyzer/src-tauri/**'
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            log-analyzer/src-tauri/target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('log-analyzer/src-tauri/Cargo.lock') }}

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Run coverage
        run: |
          cd log-analyzer/src-tauri
          cargo tarpaulin \
            --config tarpaulin.toml \
            --out Html \
            --out Xml \
            --out Lcov \
            --output-dir coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: log-analyzer/src-tauri/coverage/lcov.info
          flags: rust
          name: rust-coverage
          fail_ci_if_error: false

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage-html
          path: log-analyzer/src-tauri/coverage/tarpaulin-report.html
          retention-days: 7
