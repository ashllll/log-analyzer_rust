# Clippy Configuration for Log Analyzer
# Purpose: Configure lint behavior thresholds and allowed patterns
# Note: Lint levels (warn/deny/allow) are controlled via command-line flags
#       or crate-level attributes, not in this file.

# Allow unwrap/expect in test code
allow-unwrap-in-tests = true
allow-expect-in-tests = true
allow-panic-in-tests = true

# Complexity thresholds
cognitive-complexity-threshold = 25
too-many-lines-threshold = 100
type-complexity-threshold = 250

# Size thresholds
enum-variant-size-threshold = 200
