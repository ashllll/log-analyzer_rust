name: Rust Coverage

permissions:
  contents: read

on:
  push:
    branches: [main, develop]
    paths:
      - 'log-analyzer/src-tauri/**'
  pull_request:
    branches: [main]
    paths:
      - 'log-analyzer/src-tauri/**'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: Rust Test Coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      - name: Rust Cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          workspaces: log-analyzer/src-tauri -> target
          cache-all-crates: true

      - name: Install Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libayatana-appindicator3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912
        with:
          tool: cargo-tarpaulin

      - name: Run coverage
        run: |
          cd log-analyzer/src-tauri
          cargo tarpaulin \
            --config tarpaulin.toml \
            --out Html \
            --out Xml \
            --out Lcov \
            --output-dir coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: log-analyzer/src-tauri/coverage/lcov.info
          flags: rust
          name: rust-coverage
          fail_ci_if_error: false

      - name: Upload HTML report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: rust-coverage-html
          path: log-analyzer/src-tauri/coverage/tarpaulin-report.html
          retention-days: 7
