name: Performance Benchmarks

permissions:
  contents: read

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run benchmarks daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    name: Workspace Performance Baseline
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      - name: Rust Cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          workspaces: log-analyzer/src-tauri -> target
          cache-all-crates: true

      - name: Install Tauri dependencies
        uses: ./.github/actions/setup-tauri-linux

      # 注意：Bench 文件已移至 workspace crates 中，待后续完善
      # 当前运行 workspace 测试作为性能回归基线
      - name: Run workspace tests as performance baseline
        run: |
          cd log-analyzer/src-tauri
          cargo test --workspace --lib --bins --release -- --test-threads=4 2>&1 | tee test_results.txt

      - name: Check test performance
        run: |
          cd log-analyzer/src-tauri
          python3 -c "
          import re
          import sys

          with open('test_results.txt', 'r') as f:
              content = f.read()

          # 统计测试结果
          test_count = len(re.findall(r'test .* \.\.\. ok|test .* \.\.\. FAILED', content))
          passed = content.count('... ok')
          failed = content.count('... FAILED')

          print(f'📊 Workspace Test Summary:')
          print(f'  Total tests: {test_count}')
          print(f'  Passed: {passed}')
          print(f'  Failed: {failed}')

          if failed > 0:
              print('❌ Some tests failed')
              sys.exit(1)
          else:
              print('✅ All workspace tests passed')
          "

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: test-results-${{ github.sha }}
          path: log-analyzer/src-tauri/test_results.txt
          retention-days: 30

  benchmark-comparison:
    name: Benchmark Comparison
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    needs: benchmark
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: Download current test results
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: test-results-${{ github.sha }}
          path: current-results/
