name: Bump Version and Tag

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    branches: [main]
    types: [completed]

concurrency:
  group: bump-and-tag-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  bump-and-tag:
    name: Auto Bump Patch Version
    runs-on: ubuntu-latest
    # 仅在 CI 全部通过后执行，且不重复处理版本 bump 提交本身
    if: >
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.conclusion == 'success' &&
      !contains(github.event.workflow_run.head_commit.message, '[skip ci]')
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Verify workflow run still matches main HEAD
        id: base
        run: |
          git fetch origin main --tags

          HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
          REMOTE_MAIN_SHA="$(git rev-parse origin/main)"

          echo "workflow_run.head_sha=${HEAD_SHA}"
          echo "origin/main=${REMOTE_MAIN_SHA}"

          if [ "${HEAD_SHA}" != "${REMOTE_MAIN_SHA}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "main 已前进到新的提交，本次 bump/tag 跳过，由更新的 CI 结果接管"
            exit 0
          fi

          git checkout -B main "${HEAD_SHA}"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.base.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Compute next patch version
        id: version
        if: steps.base.outputs.skip != 'true'
        run: |
          node scripts/prepare-release.mjs plan

      - name: Update version in source files
        if: steps.base.outputs.skip != 'true'
        run: |
          node scripts/prepare-release.mjs apply --version "${{ steps.version.outputs.targetVersion }}"
          node scripts/prepare-release.mjs check

      - name: Commit version bump and push tag
        id: publish
        if: steps.base.outputs.skip != 'true'
        run: |
          VERSION="${{ steps.version.outputs.targetVersion }}"
          TAG="${{ steps.version.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            log-analyzer/package.json \
            log-analyzer/src-tauri/Cargo.toml \
            log-analyzer/src-tauri/tauri.conf.json \
            log-analyzer/src-tauri/crates/la-core/Cargo.toml \
            log-analyzer/src-tauri/crates/la-storage/Cargo.toml \
            log-analyzer/src-tauri/crates/la-search/Cargo.toml \
            log-analyzer/src-tauri/crates/la-archive/Cargo.toml

          if git diff --staged --quiet; then
            echo "版本文件未变更，跳过 commit"
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: bump version to ${VERSION} [skip ci]"
            git push origin HEAD:main
            echo "已推送版本 bump commit"
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
          fi

          # 创建并推送 tag
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag ${TAG} 已存在，跳过"
            echo "tag_created=false" >> $GITHUB_OUTPUT
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "已创建并推送 tag: ${TAG}"
            echo "tag_created=true" >> $GITHUB_OUTPUT
          fi

      - name: Dispatch release workflow
        if: >
          steps.base.outputs.skip != 'true' &&
          steps.publish.outputs.tag_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.publish.outputs.tag }}"
          echo "触发 release 工作流: ${TAG}"
          curl -sSf \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/release.yml/dispatches" \
            -d "{\"ref\":\"main\",\"inputs\":{\"tag\":\"${TAG}\",\"prerelease\":\"false\"}}"
          echo "已触发 release 工作流 for ${TAG}"
