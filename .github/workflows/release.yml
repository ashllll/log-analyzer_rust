name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "要发布的 tag（如 v1.2.36）"
        required: true
      prerelease:
        description: "标记为预发布版本"
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: "22"
  CARGO_NET_RETRY: 10

jobs:
  release:
    name: Build and Release (${{ matrix.platform.name }})
    permissions:
      contents: write
      # OIDC 支持，用于未来云资源访问
      id-token: write
    concurrency:
      group: release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}-${{ matrix.platform.name }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            name: linux-x64
          # macos-15-intel 是最后一个 x86_64 macOS 镜像，2027年8月移除
          - os: macos-15
            target: x86_64-apple-darwin
            name: macos-x64
          - os: macos-15
            target: aarch64-apple-darwin
            name: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x64

    runs-on: ${{ matrix.platform.os }}

    steps:
      - name: Resolve release tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "name=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "name=$REF_NAME" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ steps.tag.outputs.name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: ${{ matrix.platform.target }}

      - name: Setup MSVC (Windows)
        if: matrix.platform.os == 'windows-latest'
        # ilammy/msvc-dev-cmd@v1.13.0
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48ce768e747160aae2

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          workspaces: log-analyzer/src-tauri -> target
          cache-all-crates: true

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: log-analyzer/package-lock.json

      - name: Install system dependencies (Ubuntu)
        if: matrix.platform.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libayatana-appindicator3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        run: |
          cd log-analyzer
          npm ci

      - name: Set executable permissions for bundled binaries (Unix)
        if: runner.os != 'Windows'
        run: chmod +x log-analyzer/src-tauri/binaries/unrar-*

      - name: Build and publish release
        # tauri-apps/tauri-action@v0.6.2
        uses: tauri-apps/tauri-action@8c3fff3fe1de5d8d5c3d4f8e1a7b2c3d4e5f6a7b8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri 1.x 签名密钥
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          # Tauri 2.x 签名密钥（与 1.x 密钥相同，变量名变更）
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: log-analyzer
          tagName: ${{ steps.tag.outputs.name }}
          releaseName: "Log Analyzer ${{ steps.tag.outputs.name }}"
          releaseBody: |
            查看 [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) 了解本版本变更详情。
          releaseDraft: false
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          args: --target ${{ matrix.platform.target }}
