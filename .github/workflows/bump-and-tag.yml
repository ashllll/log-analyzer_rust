name: Bump Version and Tag

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    branches: [main]
    types: [completed]

concurrency:
  group: bump-and-tag-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  bump-and-tag:
    name: Auto Bump Patch Version
    runs-on: ubuntu-latest
    # 仅在 CI 全部通过后执行，且不重复处理版本 bump 提交本身
    if: >
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.conclusion == 'success' &&
      !contains(github.event.workflow_run.head_commit.message, '[skip ci]')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Verify workflow run still matches main HEAD
        id: base
        run: |
          git fetch origin main --tags

          HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
          REMOTE_MAIN_SHA="$(git rev-parse origin/main)"

          echo "workflow_run.head_sha=${HEAD_SHA}"
          echo "origin/main=${REMOTE_MAIN_SHA}"

          if [ "${HEAD_SHA}" != "${REMOTE_MAIN_SHA}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "main 已前进到新的提交，本次 bump/tag 跳过，由更新的 CI 结果接管"
            exit 0
          fi

          git checkout -B main "${HEAD_SHA}"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.base.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Compute next patch version
        id: version
        if: steps.base.outputs.skip != 'true'
        run: |
          # 取最新 semver tag，若无则从 v0.0.0 起
          LATEST_TAG=$(git tag -l "v*" --sort=-v:refname | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          LATEST_VERSION="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
          PATCH=$((PATCH + 1))
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          TAG="v${VERSION}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "下一版本: $VERSION"

      - name: Update version in source files
        if: steps.base.outputs.skip != 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd log-analyzer

          # 更新 package.json
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            p.version = '${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

          # 更新 Cargo.toml（仅替换 [package] 下第一个 version 行）
          python3 -c "
          import re
          content = open('src-tauri/Cargo.toml').read()
          content = re.sub(r'^version = \"[^\"]*\"', 'version = \"${VERSION}\"', content, count=1, flags=re.MULTILINE)
          open('src-tauri/Cargo.toml', 'w').write(content)
          "

          for crate in src-tauri/crates/la-core/Cargo.toml src-tauri/crates/la-storage/Cargo.toml src-tauri/crates/la-search/Cargo.toml src-tauri/crates/la-archive/Cargo.toml; do
            python3 -c "
          import re
          path = '${crate}'
          content = open(path).read()
          content = re.sub(r'^version = \"[^\"]*\"', 'version = \"${VERSION}\"', content, count=1, flags=re.MULTILINE)
          open(path, 'w').write(content)
          "
          done

          # 更新 tauri.conf.json
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            p.version = '${VERSION}';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(p, null, 2) + '\n');
          "

          echo "package.json:      $(node -p \"require('./package.json').version\")"
          echo "Cargo.toml:        $(grep '^version' src-tauri/Cargo.toml | head -1)"
          echo "tauri.conf.json:   $(node -p \"require('./src-tauri/tauri.conf.json').version\")"
          echo "la-core:           $(grep '^version' src-tauri/crates/la-core/Cargo.toml | head -1)"
          echo "la-storage:        $(grep '^version' src-tauri/crates/la-storage/Cargo.toml | head -1)"
          echo "la-search:         $(grep '^version' src-tauri/crates/la-search/Cargo.toml | head -1)"
          echo "la-archive:        $(grep '^version' src-tauri/crates/la-archive/Cargo.toml | head -1)"

      - name: Commit version bump and push tag
        id: publish
        if: steps.base.outputs.skip != 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            log-analyzer/package.json \
            log-analyzer/src-tauri/Cargo.toml \
            log-analyzer/src-tauri/tauri.conf.json \
            log-analyzer/src-tauri/crates/la-core/Cargo.toml \
            log-analyzer/src-tauri/crates/la-storage/Cargo.toml \
            log-analyzer/src-tauri/crates/la-search/Cargo.toml \
            log-analyzer/src-tauri/crates/la-archive/Cargo.toml

          if git diff --staged --quiet; then
            echo "版本文件未变更，跳过 commit"
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: bump version to ${VERSION} [skip ci]"
            git push origin HEAD:main
            echo "已推送版本 bump commit"
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
          fi

          # 创建并推送 tag
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag ${TAG} 已存在，跳过"
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "已创建并推送 tag: ${TAG}"
          fi
