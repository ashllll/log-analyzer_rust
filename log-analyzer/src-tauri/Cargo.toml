[package]
name = "log-analyzer"
version = "1.0.1"
description = "Log Analyzer - FFI Backend for Flutter"
authors = ["you"]
edition = "2021"

# Flutter FFI 支持 - 生成 cdylib
[lib]
name = "log_analyzer"
crate-type = ["cdylib", "lib"]

# 允许 flutter_rust_bridge 宏生成的 cfg 条件
[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ["cfg(frb_expand)"] }

[dependencies]
# FFI Bridge for Flutter (flutter_rust_bridge 2.x)
flutter_rust_bridge = { version = "=2.11.1", features = [] }

# 条件依赖: Tauri (仅在 standalone feature 时启用)
tauri = { version = "2.0.0", features = [], optional = true }
tauri-build = { version = "2.0.0", features = [], optional = true }
tauri-plugin-opener = { version = "2.5", optional = true }
tauri-plugin-dialog = { version = "2.6", optional = true }
tauri-plugin-shell = { version = "2.3", optional = true }
# color-eyre 在下方统一声明

serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1.0", features = ["v4", "serde"] }
regex = "1.11"          # 正则表达式库
regex-automata = "0.4"  # DFA 正则引擎（高性能流式匹配）
aho-corasick = "1.1"     # 多模式匹配算法（搜索性能优化）
chrono = { version = "0.4", features = ["serde"] }  # 时间序列化支持
walkdir = "2.4"
tempfile = "3.10"
zip = "0.6"
tar = "0.4"
flate2 = "1.0"
mime_guess = "2.0"
encoding_rs = "0.8"
chardetng = "0.1"  # 编码探测库
tokio = { version = "1", features = ["full"] }
bincode = "1.3"
rayon = "1.8"  # 并行处理
dunce = "1.0"   # Windows 路径规范化（UNC路径处理）
lru = "0.12"    # LRU 缓存（搜索结果缓存）
notify = "6.1"  # 文件系统监听
unicode-normalization = "0.1"  # Unicode规范化
thiserror = "1.0"  # 错误处理
async-trait = "0.1"  # 异步trait支持
sysinfo = { version = "0.31", default-features = true }
once_cell = "1.20"  # 延迟初始化静态变量

# Phase 1: Industry-Standard Error Handling & Logging
eyre = "0.6"  # 现代错误处理
color-eyre = { version = "0.6", optional = true }  # 增强错误报告（standalone 模式）
miette = { version = "5.0", features = ["fancy"] }  # 用户友好的错误诊断
tracing = "0.1"  # 结构化日志和追踪
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }  # 日志订阅器
tracing-appender = "0.2"  # 日志文件轮转
sentry = { version = "0.32", features = ["tracing"] }  # 错误监控

# Phase 1: High-Performance Concurrency
parking_lot = { version = "0.12", features = ["arc_lock", "send_guard"] }  # 高性能锁
crossbeam = "0.8"  # 无锁数据结构
tokio-util = { version = "0.7", features = ["rt"] }  # 异步工具和取消令牌

# Phase 2: Enterprise-Grade Caching
moka = { version = "0.12", features = ["future", "sync"] }  # 企业级缓存系统

# Rate limiting using governor (industry-standard)
governor = { version = "0.6", features = ["std"] }  # 速率限制器
nonzero_ext = "0.3"  # 辅助库，用于 governor

# Phase 2: High-Performance Search Engine
tantivy = { version = "0.22", features = ["mmap"] }  # Rust 原生全文搜索引擎
roaring = { version = "0.10", features = ["serde"] }  # 高效位图索引
memmap2 = "0.9"  # 内存映射文件（PageManager 使用）
base64 = "0.22"  # Base64 编码（FFI 数据传输）

# Phase 3: Production Validation Framework
validator = { version = "0.18", features = ["derive"] }  # 结构化验证框架
sanitize-filename = "0.5"  # 文件名安全化

# Phase 3: Automatic Resource Management
scopeguard = "1.2"  # RAII模式和自动资源清理

# Phase 2: Async Streams (for concurrent search)
futures = "0.3"  # StreamExt for buffer_unordered

# Phase 4: Configuration Management
config = "0.14"  # 行业标准配置管理（多层配置、env支持）
toml = "0.8"  # TOML 配置文件解析
dashmap = "5.5"  # 并发哈希映射
sha2 = "0.10"  # SHA-256 哈希算法
sqlx = { version = "0.7", features = ["runtime-tokio-native-tls", "sqlite"] }  # SQLite 数据库
async-compression = { version = "0.4", features = ["tokio", "gzip", "zstd"] }  # 流式压缩/解压
num_cpus = "1.16"  # CPU 核心数检测

# Phase 5: Archive Support (Pure Rust Priority)
unrar = "0.5"  # libunrar C bindings
sevenz-rust = "0.5"  # Pure Rust 7z support
async_zip = { version = "0.0.17", features = ["full"] }
tokio-tar = "0.3"
tokio-retry = "0.3"
bytes = "1.0"

# Monitoring and Observability
tracing-opentelemetry = { version = "0.24", optional = true }  # OpenTelemetry集成
opentelemetry = { version = "0.23", optional = true }  # 分布式追踪
opentelemetry_sdk = { version = "0.23", features = ["rt-tokio"], optional = true }  # OpenTelemetry SDK
opentelemetry-otlp = { version = "0.16", features = ["grpc-tonic"], optional = true }  # OTLP导出器（推荐，替代Jaeger）
opentelemetry-semantic-conventions = { version = "0.15", optional = true }  # 语义约定
prometheus = "0.13"  # 指标收集
metrics = "0.22"  # 应用指标

# Phase 5: Archive Support (Pure Rust Priority)
# Prefer pure Rust implementations, fall back to C bindings for edge cases

# Plugin system
libloading = "0.8"  # 动态库加载（插件系统）

# Phase 3: LogLexer (Procedural Macros)
log-lexer = { path = "crates/log-lexer" }
log-lexer-derive = { path = "crates/log-lexer-derive" }

# Phase 4: Testing Infrastructure
[dev-dependencies]
rstest = "0.18"  # 增强的单元测试框架
proptest = { version = "1.4", default-features = false, features = ["std"] }  # 属性测试框架
criterion = { version = "0.5", features = ["html_reports"] }  # 性能基准测试
tokio-test = "0.4"  # 异步测试工具
rand = "0.8"  # 随机数生成（benchmark 测试用）
rand_pcg = "0.3"  # PCG 随机数生成器（可重现的随机序列）

[features]
default = ["ffi"]  # 默认启用 FFI 模式
test = []  # 用于测试时的 mock 功能
ffi = []  # 启用 Flutter FFI 桥接
standalone = [
    "dep:tauri",
    "dep:tauri-build",
    "dep:tauri-plugin-opener",
    "dep:tauri-plugin-dialog",
    "dep:tauri-plugin-shell",
    "dep:color-eyre",
]  # 独立二进制模式，包含 Tauri 运行时
rar = []  # 启用 RAR 解压支持
telemetry = [
    "dep:tracing-opentelemetry",
    "dep:opentelemetry",
    "dep:opentelemetry_sdk",
    "dep:opentelemetry-otlp",
    "dep:opentelemetry-semantic-conventions",
]  # 启用 OpenTelemetry 遥测功能

# =============================================================================
# Benchmark 配置 (M1.3 性能验证)
# =============================================================================
# 运行命令: cargo bench --bench m1_benchmark
#
# PRD V6.0 SLA 指标:
# - FFI 视口拉取延迟 < 1ms
# - 全量并发盲搜吞吐量 3-5GB/s
# - 10GB 单体文件驻留内存 < 50MB
# - 千万级搜索结果 Roaring Bitmap 压缩 < 5MB

[[bench]]
name = "m1_benchmark"
harness = false
