# flutter_rust_bridge 代码生成配置

# Rust 库根目录
rust_root: ../log-analyzer/src-tauri

# Rust 输入路径（使用 crate 路径格式）
rust_input: crate::ffi::bridge

# Dart 输出路径
dart_output: lib/shared/services/generated

# 生成的 Dart 入口类名
dart_entrypoint_class_name: LogAnalyzerBridge

# 启用 Dart 3 特性
dart3: true

# 启用 FFI feature
rust_features:
  - ffi
