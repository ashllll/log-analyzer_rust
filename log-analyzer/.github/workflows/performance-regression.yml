name: Performance Regression Detection

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    name: Run Workspace Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: log-analyzer/src-tauri -> target
          cache-all-crates: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      # 注意：基准测试文件已随 workspace 拆分迁移，当前运行完整 workspace 测试作为回归测试
      - name: Run workspace tests
        working-directory: log-analyzer/src-tauri
        run: |
          cargo test --workspace --all-features --lib --bins -- --test-threads=4 | tee test-results.txt

      - name: Store test results
        uses: actions/upload-artifact@v4
        with:
          name: workspace-test-results
          path: log-analyzer/src-tauri/test-results.txt

      - name: Analyze test results
        working-directory: log-analyzer/src-tauri
        run: |
          echo "🔍 Analyzing workspace test results..."
          TEST_COUNT=$(grep -c 'test .* ... ok\|test .* ... FAILED' test-results.txt || true)
          FAILED_COUNT=$(grep -c '... FAILED' test-results.txt || true)

          echo "📊 Test Summary:"
          echo "  Total: $TEST_COUNT"
          echo "  Failed: $FAILED_COUNT"

          if [ "$FAILED_COUNT" -gt 0 ]; then
            echo "❌ Workspace tests failed"
            exit 1
          else
            echo "✅ All workspace tests passed"
          fi

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = fs.readFileSync('log-analyzer/src-tauri/test-results.txt', 'utf8');

            // Extract summary statistics
            const passed = (results.match(/test .* \.\.\. ok/g) || []).length;
            const failed = (results.match(/test .* \.\.\. FAILED/g) || []).length;

            const body = `## 🧪 Workspace Test Results

            | Status | Count |
            |--------|-------|
            | ✅ Passed | ${passed} |
            | ❌ Failed | ${failed} |

            <details>
            <summary>Full Test Output</summary>

            \`\`\`
            ${results.substring(0, 3000)}${results.length > 3000 ? '\n... (truncated)' : ''}
            \`\`\`
            </details>

            ---
            *Workspace tests for Cargo workspace crates*`

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  property-tests:
    name: Run Property-Based Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: log-analyzer/src-tauri -> target
          cache-all-crates: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      # 在 workspace 中运行属性测试
      - name: Run property tests
        working-directory: log-analyzer/src-tauri
        run: |
          cargo test --workspace --all-features property -- --test-threads=1 --nocapture 2>&1 | tee property-test-results.txt

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: property-test-results
          path: log-analyzer/src-tauri/property-test-results.txt

  frontend-tests:
    name: Run Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: log-analyzer/package-lock.json

      - name: Install dependencies
        working-directory: log-analyzer
        run: npm ci

      - name: Run tests
        working-directory: log-analyzer
        run: npm test -- --testPathIgnorePatterns="e2e" --passWithNoTests --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: log-analyzer/coverage/lcov.info
          flags: frontend
          name: frontend-coverage

  test-report:
    name: Generate Test Report
    needs: [benchmark, property-tests, frontend-tests]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: workspace-test-results

      - name: Generate report
        run: |
          echo "# Workspace Test Summary" > test-report.md
          echo "" >> test-report.md
          echo "## Test Results" >> test-report.md
          echo "\`\`\`" >> test-report.md
          cat test-results.txt >> test-report.md
          echo "\`\`\`" >> test-report.md

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: workspace-test-report
          path: test-report.md
