# Log Analyzer Flutter - 重构后的配置
# 优化项：
# 1. 添加 fpdart 用于函数式错误处理
# 2. 添加 dart_mappable 替代部分 freezed 场景
# 3. 更新 Riverpod 到最新版本

name: log_analyzer_flutter
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.9.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # ==================== 状态管理 ====================
  # Riverpod 3.0 - 业界标准状态管理方案
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0
  hooks_riverpod: ^3.0.0
  flutter_hooks: ^0.21.0
  
  # ==================== 路由 ====================
  go_router: ^14.0.0
  
  # ==================== 函数式编程 ====================
  # fpdart - Dart 函数式编程库（替代 dartz，更活跃）
  fpdart: ^1.1.0
  
  # ==================== 数据类/不可变对象 ====================
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  dart_mappable: ^4.0.0
  
  # ==================== FFI ====================
  flutter_rust_bridge: ^2.0.0
  
  # ==================== 并发/Isolate ====================
  # isolate_manager - 简化 Isolate 管理
  isolate_manager: ^3.0.0
  
  # ==================== 事件总线 ====================
  # event_bus_plus - 类型安全的事件总线
  event_bus: ^2.0.0
  
  # ==================== 依赖注入 ====================
  get_it: ^8.0.0
  injectable: ^2.0.0
  
  # ==================== 本地存储 ====================
  shared_preferences: ^2.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # ==================== UI 组件 ====================
  shimmer: ^3.0.0
  fl_chart: ^0.70.0
  lucide_icons_flutter: ^1.0.0
  flutter_virtual_scroll: ^0.1.0
  
  # ==================== 文件操作 ====================
  file_picker: ^8.0.0
  desktop_drop: ^0.4.0
  path_provider: ^2.1.0
  path: ^1.9.0
  
  # ==================== 错误追踪 ====================
  sentry_flutter: ^8.0.0
  
  # ==================== 工具库 ====================
  collection: ^1.18.0
  meta: ^1.15.0
  uuid: ^4.0.0
  equatable: ^2.0.0
  logger: ^2.0.0
  
  # ==================== 响应式编程 ====================
  rxdart: ^0.28.0

# 开发依赖
dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  
  # 代码生成工具
  build_runner: ^2.4.0
  freezed: ^3.2.3
  json_serializable: ^6.11.2
  riverpod_generator: ^3.0.0
  riverpod_lint: ^3.0.0
  injectable_generator: ^2.0.0
  dart_mappable_builder: ^4.0.0
  hive_generator: ^2.0.0
  
  # 测试工具
  mockito: ^5.4.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
  shaders:
    - shaders/heatmap.frag
  
  generate: true
