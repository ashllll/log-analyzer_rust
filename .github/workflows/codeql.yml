name: CodeQL

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, rust]
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357
        with:
          languages: ${{ matrix.language }}

      - name: Install Rust toolchain (Rust only)
        if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: 1.88.0
          components: clippy

      - name: Install Tauri dependencies (Rust only)
        if: matrix.language == 'rust'
        uses: ./.github/actions/setup-tauri-linux

      - name: Build (Rust)
        if: matrix.language == 'rust'
        run: |
          cd log-analyzer/src-tauri
          cargo build --all-features

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357
