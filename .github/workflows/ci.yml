name: CI/CD Pipeline

permissions:
  contents: read

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# 避免同一个 PR 的多次推送导致 CI 任务堆积
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  NODE_VERSION: '22'
  CARGO_NET_RETRY: 10

jobs:
  ci-config:
    name: CI Configuration
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Validate workflow invariants
        run: node scripts/check_ci_workflows.mjs --verify-remote

  # Rust 后端测试
  test-rust:
    name: Rust Unit Tests
    runs-on: ${{ matrix.os }}
    needs: ci-config
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          # macos-15-intel 是最后一个 x86_64 macOS 镜像，2027年8月移除
          - os: macos-15
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin

    steps:
      - name: Checkout code
        # actions/checkout@v4.2.2
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Install Rust toolchain
        # 显式固定到 src-tauri/rust-toolchain.toml 对应的 1.88，避免根目录 stable 与子目录 pinned toolchain 漂移
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.88.0
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - name: Rust Cache
        # swatinem/rust-cache@v2.7.8
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          workspaces: log-analyzer/src-tauri -> target
          cache-all-crates: true

      - name: Install Tauri dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-24.04'
        uses: ./.github/actions/setup-tauri-linux

      - name: Check code formatting
        run: |
          cd log-analyzer/src-tauri
          cargo fmt -- --check

      - name: Fetch dependencies
        run: |
          cd log-analyzer/src-tauri
          cargo fetch

      - name: Run clippy linter
        run: |
          cd log-analyzer/src-tauri
          cargo clippy --all-features --all-targets -- -D warnings
        shell: bash

      - name: Run unit tests
        run: |
          cd log-analyzer/src-tauri
          cargo test --all-features --lib --bins -- --test-threads=4 --nocapture 2>&1 | tee test-output.log
        env:
          RUST_BACKTRACE: 1 # HI-38: Use '1' instead of 'full' to avoid leaking absolute paths/usernames
          RUST_TEST_TIME_INTEGRATION: 1

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: rust-tests-${{ matrix.target }}
          path: log-analyzer/src-tauri/test-output.log
          retention-days: 7

  # IPC 一致性检查
  ipc-consistency-check:
    name: IPC Consistency Check
    runs-on: ubuntu-24.04
    needs: ci-config
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run IPC consistency check
        run: bash scripts/check_ipc_consistency.sh

  # 前端测试
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-24.04
    needs: ci-config
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: log-analyzer/package-lock.json

      - name: Install dependencies
        run: |
          cd log-analyzer
          npm ci

      - name: Run linter
        run: |
          cd log-analyzer
          npm run lint

      - name: Run type check
        run: |
          cd log-analyzer
          npm run type-check

      - name: Run Jest tests
        run: |
          cd log-analyzer
          npm run test:ci
        env:
          NODE_ENV: test
          CI: true

      - name: Build frontend (Validation)
        run: |
          cd log-analyzer
          npm run build

  desktop-smoke:
    name: Desktop Smoke Build
    runs-on: ubuntu-24.04
    needs: [test-rust, test-frontend]
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: log-analyzer/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.88.0

      - name: Rust Cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          workspaces: log-analyzer/src-tauri -> target
          cache-all-crates: true

      - name: Install Tauri dependencies
        uses: ./.github/actions/setup-tauri-linux

      - name: Install frontend dependencies
        run: |
          cd log-analyzer
          npm ci

      - name: Build Tauri app (debug smoke, no bundle)
        run: |
          cd log-analyzer
          npm run tauri build -- --debug --no-bundle

  # 集成测试
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-24.04
    needs: [test-rust, test-frontend, desktop-smoke]
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.88.0

      - name: Rust Cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          workspaces: log-analyzer/src-tauri -> target

      - name: Install Tauri dependencies
        uses: ./.github/actions/setup-tauri-linux

      - name: Run integration tests
        run: |
          cd log-analyzer/src-tauri
          cargo test --workspace --all-features -- --test-threads=2 --nocapture
        env:
          RUST_BACKTRACE: 1 # HI-38: Use '1' instead of 'full' to avoid leaking absolute paths/usernames

  release-automation-dry-run:
    name: Release Automation Dry Run
    runs-on: ubuntu-24.04
    needs: [integration-test]
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate release planning
        run: |
          node scripts/prepare-release.mjs check
          node scripts/prepare-release.mjs plan
