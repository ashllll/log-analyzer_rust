name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '要发布的 tag（如 v1.2.36）'
        required: true
      prerelease:
        description: '标记为预发布版本'
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: '22'
  CARGO_NET_RETRY: 10

jobs:
  release:
    name: Build and Release (${{ matrix.platform.name }})
    permissions:
      contents: write
    concurrency:
      group: release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: linux-x64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x64

    runs-on: ${{ matrix.platform.os }}

    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Setup MSVC (Windows)
        if: matrix.platform.os == 'windows-latest'
        uses: ilammy/msvc-toolchain@v1.13.0

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: log-analyzer/src-tauri -> target
          cache-all-crates: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: log-analyzer/package-lock.json

      - name: Install system dependencies (Ubuntu)
        if: matrix.platform.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libayatana-appindicator3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        run: |
          cd log-analyzer
          npm ci

      - name: Set executable permissions for bundled binaries (Unix)
        if: runner.os != 'Windows'
        run: chmod +x log-analyzer/src-tauri/binaries/unrar-*

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri 1.x 签名密钥
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          # Tauri 2.x 签名密钥（与 1.x 密钥相同，变量名变更）
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: log-analyzer
          tagName: ${{ steps.tag.outputs.name }}
          releaseName: 'Log Analyzer ${{ steps.tag.outputs.name }}'
          releaseBody: |
            查看 [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) 了解本版本变更详情。
          releaseDraft: false
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          args: --target ${{ matrix.platform.target }}
