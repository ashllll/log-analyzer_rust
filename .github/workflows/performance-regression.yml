name: Performance Regression Detection

permissions:
  contents: read

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "22"

jobs:
  benchmark:
    name: Run Workspace Tests
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      - name: Rust Cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          workspaces: log-analyzer/src-tauri -> target
          cache-all-crates: true

      - name: Install Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libayatana-appindicator3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      # 注意：基准测试文件已随 workspace 拆分迁移，当前运行完整 workspace 测试作为回归测试
      - name: Run workspace tests
        working-directory: log-analyzer/src-tauri
        run: |
          cargo test --workspace --all-features --lib --bins -- --test-threads=4 | tee test-results.txt

      - name: Store test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: workspace-test-results
          path: log-analyzer/src-tauri/test-results.txt

      - name: Analyze test results
        working-directory: log-analyzer/src-tauri
        run: |
          echo "🔍 Analyzing workspace test results..."
          TEST_COUNT=$(grep -c 'test .* ... ok\|test .* ... FAILED' test-results.txt || true)
          FAILED_COUNT=$(grep -c '... FAILED' test-results.txt || true)

          echo "📊 Test Summary:"
          echo "  Total: $TEST_COUNT"
          echo "  Failed: $FAILED_COUNT"

          if [ "$FAILED_COUNT" -gt 0 ]; then
            echo "❌ Workspace tests failed"
            exit 1
          else
            echo "✅ All workspace tests passed"
          fi

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const fs = require('fs');
            const results = fs.readFileSync('log-analyzer/src-tauri/test-results.txt', 'utf8');

            // Extract summary statistics
            const passed = (results.match(/test .* \.\.\. ok/g) || []).length;
            const failed = (results.match(/test .* \.\.\. FAILED/g) || []).length;

            const body = `## 🧪 Workspace Test Results

            | Status | Count |
            |--------|-------|
            | ✅ Passed | ${passed} |
            | ❌ Failed | ${failed} |

            <details>
            <summary>Full Test Output</summary>

            \`\`\`
            ${results.substring(0, 3000)}${results.length > 3000 ? '\n... (truncated)' : ''}
            \`\`\`
            </details>

            ---
            *Workspace tests for Cargo workspace crates*`

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  property-tests:
    name: Run Property-Based Tests
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      - name: Rust Cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          workspaces: log-analyzer/src-tauri -> target
          cache-all-crates: true

      - name: Install Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libayatana-appindicator3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      # 在 workspace 中运行属性测试
      - name: Run property tests
        working-directory: log-analyzer/src-tauri
        run: |
          cargo test --workspace --all-features property -- --test-threads=1 --nocapture 2>&1 | tee property-test-results.txt

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: property-test-results
          path: log-analyzer/src-tauri/property-test-results.txt

  frontend-tests:
    name: Run Frontend Tests
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: log-analyzer/package-lock.json

      - name: Install dependencies
        working-directory: log-analyzer
        run: npm ci

      - name: Run tests
        working-directory: log-analyzer
        run: npm test -- --testPathIgnorePatterns="e2e" --passWithNoTests --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: log-analyzer/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

  test-report:
    name: Generate Test Report
    needs: [benchmark, property-tests, frontend-tests]
    runs-on: ubuntu-24.04
    if: always()
    permissions:
      contents: read

    steps:
      - name: Download test results
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: workspace-test-results

      - name: Generate report
        run: |
          echo "# Workspace Test Summary" > test-report.md
          echo "" >> test-report.md
          echo "## Test Results" >> test-report.md
          echo "\`\`\`" >> test-report.md
          cat test-results.txt >> test-report.md
          echo "\`\`\`" >> test-report.md

      - name: Upload report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: workspace-test-report
          path: test-report.md
